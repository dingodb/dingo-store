-role=coordinator
-conf=./conf/coordinator.yaml
-coor_url=file://./conf/coor_list
-max_hnsw_memory_size_of_region=2147483648
-async_create_table=true
-raft_sync=true
-braft_use_align_hearbeat=false
-bdb_stat_time_s=1048576
-bdb_dead_lock_detect_time_s=1048576
-bdb_checkpoint_time_s=1048576
-free_memory_to_system_interval=60
-enable_dir_service=false
-enable_threads_service=false
-dingo_log_switch_coor_kv=false
-dingo_log_switch_coor_watch=false
-dingo_log_switch_coor_lease=false
-default_replica_num=$DEFAULT_REPLICA_NUM$
-dingo_log_switch_scalar_speed_up_detail=true
-service_log_threshold_time_ns=100000000
-coordinator_service_worker_num=32
-coordinator_service_worker_max_pending_num=1024
-meta_service_worker_num=32
-meta_service_worker_max_pending_num=1024
-version_service_worker_num=32
-version_service_worker_max_pending_num=1024
-raft_meta_enable_leveldb_tuning=true
-raft_meta_enable_preserialize=true
-raft_meta_force_no_sync=true
-raft_meta_periodic_sync_enabled=false
-raft_meta_periodic_sync_interval_ms=1000
-raft_latency_log_batch_append_entries=true
-raft_latency_log_append_entries=true
-raft_latency_log_handle_append_entries=true
-raft_latency_log_init=true
-rocks_log_enable_get_term_cache=true
-store_state_machine_enable_independent_queue=false
-print_recycle_orphan_region_not_table_or_index=false
-print_process_job_error=true
-print_periodic_merge_check=false
-print_periodic_split_check=false
-print_raft_add_node=true
-max_restore_data_memory_size=10485760
-max_restore_count=32768
-raft_latency_log_threshold_ms=1000
